<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Ditty PA</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8a020;
    --accent2: #c0392b;
    --green: #27ae60;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

  /* SETUP SCREEN */
  #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  #setup h1 { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: -0.5px; }
  #setup p { color: var(--text2); font-size: 14px; text-align: center; margin-bottom: 32px; }
  #setup input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
  #setup input:focus { border-color: var(--accent); }
  #setup button { width: 100%; background: var(--accent); color: #000; font-weight: 800; font-size: 16px; padding: 16px; border: none; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.5px; }

  /* MAIN APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  
  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; flex-direction: column; }
  .header-title { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 18px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .btn-icon:active { background: var(--border); }

  /* BRIEFING SELECTOR */
  .briefing-tabs { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 12px; font-weight: 600; padding: 8px 4px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* CONTENT */
  .content { flex: 1; padding: 16px; padding-bottom: 90px; }

  /* GENERATE BUTTON */
  .generate-wrap { padding: 0 0 16px 0; }
  .btn-generate { width: 100%; background: var(--accent); color: #000; font-weight: 800; font-size: 15px; padding: 15px; border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-generate:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }
  .btn-generate:active:not(:disabled) { opacity: 0.85; }

  /* BRIEFING CARD */
  .briefing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .briefing-empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .briefing-empty .icon { font-size: 40px; margin-bottom: 12px; }
  .briefing-empty p { font-size: 14px; }

  /* SECTION */
  .section { border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .section-header:active { background: var(--surface2); }
  .section-emoji { font-size: 18px; width: 24px; text-align: center; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; flex: 1; }
  .section-badge { background: var(--accent2); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .section-badge.ok { background: var(--green); }
  .section-chevron { color: var(--text3); font-size: 12px; transition: transform 0.2s; }
  .section-chevron.open { transform: rotate(90deg); }
  .section-body { padding: 0 16px 14px 16px; display: none; }
  .section-body.open { display: block; }

  /* CONTENT BLOCKS */
  .info-line { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 4px; }
  .info-line strong { color: var(--accent); }
  .alert-line { font-size: 13px; color: var(--accent2); font-weight: 600; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 6px; }
  .ok-line { font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 6px; }
  .muted { color: var(--text2); font-size: 13px; }

  /* TASKS WITH CHECKBOXES */
  .task-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; }
  .task-check.checked { background: var(--green); border-color: var(--green); }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
  .task-text { font-size: 14px; color: var(--text); line-height: 1.4; flex: 1; }
  .task-text.done { color: var(--text3); text-decoration: line-through; }
  .task-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .task-overdue { color: var(--accent2); font-weight: 700; }

  /* STOCK ROW */
  .stock-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .stock-row:last-child { border-bottom: none; }
  .stock-ticker { font-size: 14px; font-weight: 700; color: var(--accent); width: 60px; }
  .stock-price { font-size: 14px; color: var(--text); flex: 1; text-align: center; }
  .stock-change { font-size: 13px; font-weight: 600; text-align: right; min-width: 70px; }
  .stock-change.up { color: var(--green); }
  .stock-change.down { color: var(--accent2); }
  .stock-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* MOOD SLIDER */
  .mood-wrap { padding: 8px 0; }
  .mood-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .mood-row { display: flex; align-items: center; gap: 12px; }
  .mood-slider { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
  .mood-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .mood-value { font-size: 20px; font-weight: 800; color: var(--accent); width: 30px; text-align: right; }

  /* INPUT ROW */
  .input-row { display: flex; gap: 8px; margin-top: 10px; }
  .input-field { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; }
  .input-field:focus { border-color: var(--accent); }
  .btn-small { background: var(--accent); color: #000; font-weight: 700; font-size: 13px; padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }

  /* QUICK ACTIONS */
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .qa-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; text-align: left; }
  .qa-btn:active { background: var(--border); }
  .qa-emoji { font-size: 20px; margin-bottom: 6px; }
  .qa-label { font-size: 12px; font-weight: 600; color: var(--text2); }

  /* LOADING */
  .loading-wrap { padding: 32px 16px; text-align: center; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 14px; }
  .loading-steps { margin-top: 12px; }
  .loading-step { font-size: 12px; color: var(--text3); padding: 3px 0; }
  .loading-step.active { color: var(--accent); }
  .loading-step.done { color: var(--green); }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 20px; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 0; }
  .nav-btn:active { opacity: 0.7; }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.3px; }
  .nav-btn.active .nav-label { color: var(--accent); }

  /* REMIND MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; height: 80px; outline: none; resize: none; font-family: var(--font); }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 14px; font-weight: 600; padding: 12px; cursor: pointer; }
  .btn-submit { flex: 2; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; padding: 12px; cursor: pointer; }

  /* SETTINGS */
  #settings-screen { display: none; flex-direction: column; min-height: 100vh; }
  .settings-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .back-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 700; cursor: pointer; padding: 0; }
  .settings-title { font-size: 18px; font-weight: 800; }
  .settings-body { padding: 16px; }
  .setting-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .setting-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 16px 6px; }
  .setting-row { display: flex; align-items: center; padding: 12px 16px; border-top: 1px solid var(--border); gap: 12px; }
  .setting-row:first-of-type { border-top: none; }
  .setting-row label { font-size: 14px; color: var(--text); flex: 1; }
  .setting-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; width: 140px; outline: none; }
  .setting-row input:focus { border-color: var(--accent); }
  .btn-save-settings { width: 100%; background: var(--accent); color: #000; font-weight: 800; font-size: 15px; padding: 15px; border: none; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
  .version { text-align: center; color: var(--text3); font-size: 11px; margin-top: 24px; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>⚡ Ditty PA</h1>
  <p>Your personal assistant. Enter your Claude API key to get started.</p>
  <input type="password" id="setup-key" placeholder="sk-ant-api03-..." autocomplete="off">
  <input type="text" id="setup-zip" placeholder="ZIP code (e.g. 46151)" maxlength="10">
  <button onclick="saveSetup()">GET STARTED</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">⚡ Ditty PA</div>
      <div class="header-sub" id="header-date">Loading...</div>
    </div>
    <div class="header-actions">
      <div class="btn-icon" onclick="openRemind()">🔔</div>
      <div class="btn-icon" onclick="showSettings()">⚙️</div>
    </div>
  </div>

  <div class="briefing-tabs">
    <div class="tab-btn active" id="tab-morning" onclick="setTab('morning')">🌅 5:30AM</div>
    <div class="tab-btn" id="tab-midday" onclick="setTab('midday')">☀️ 12PM</div>
    <div class="tab-btn" id="tab-evening" onclick="setTab('evening')">🌙 9PM</div>
  </div>

  <div class="content" id="main-content">
    <div class="generate-wrap">
      <button class="btn-generate" id="gen-btn" onclick="generateBriefing()">
        <span>⚡</span><span id="gen-label">Generate Morning Briefing</span>
      </button>
    </div>
    <div id="briefing-output">
      <div class="briefing-empty">
        <div class="icon">📋</div>
        <p>Tap the button above to generate your briefing</p>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-btn active" onclick="showMain()">
      <div class="nav-icon">📋</div>
      <div class="nav-label">BRIEF</div>
    </div>
    <div class="nav-btn" onclick="openRemind()">
      <div class="nav-icon">🔔</div>
      <div class="nav-label">REMIND</div>
    </div>
    <div class="nav-btn" onclick="showSettings()">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">SETTINGS</div>
    </div>
  </div>
</div>

<!-- SETTINGS SCREEN -->
<div id="settings-screen">
  <div class="settings-header">
    <button class="back-btn" onclick="showMain()">← Back</button>
    <div class="settings-title">Settings</div>
  </div>
  <div class="settings-body">
    <div class="setting-group">
      <div class="setting-label">API</div>
      <div class="setting-row">
        <label>Claude API Key</label>
        <input type="password" id="s-key" placeholder="sk-ant-...">
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-label">Location</div>
      <div class="setting-row">
        <label>ZIP Code</label>
        <input type="text" id="s-zip" placeholder="46151" maxlength="10">
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-label">About</div>
      <div class="setting-row">
        <label>Account</label>
        <span style="color:var(--text2);font-size:13px;">hddittemore@gmail.com</span>
      </div>
    </div>
    <button class="btn-save-settings" onclick="saveSettings()">Save Settings</button>
    <div class="version">Ditty PA v1.0</div>
  </div>
</div>

<!-- REMIND MODAL -->
<div class="modal-overlay" id="remind-modal">
  <div class="modal">
    <div class="modal-title">🔔 Set a Reminder</div>
    <textarea id="remind-text" placeholder="e.g. Pick up chicken feed at 4:30pm today"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRemind()">Cancel</button>
      <button class="btn-submit" onclick="submitRemind()">Set Reminder</button>
    </div>
  </div>
</div>

<script>
var S = {};
var currentTab = 'morning';
var briefingData = {};
var tasks = {};

function loadState() {
  try {
    var raw = localStorage.getItem('ditty_pa_v1');
    if (raw) S = JSON.parse(raw);
  } catch(e) { S = {}; }
  try {
    var t = localStorage.getItem('ditty_pa_tasks');
    if (t) tasks = JSON.parse(t);
  } catch(e) { tasks = {}; }
}

function saveState() {
  localStorage.setItem('ditty_pa_v1', JSON.stringify(S));
}

function saveTasks() {
  localStorage.setItem('ditty_pa_tasks', JSON.stringify(tasks));
}

function init() {
  loadState();
  updateHeaderDate();
  if (!S.apiKey) {
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  } else {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('settings-screen').style.display = 'none';
  }
  setInterval(updateHeaderDate, 60000);
}

function updateHeaderDate() {
  var now = new Date();
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = now.getHours();
  var m = now.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (!h) h = 12;
  var ms = m < 10 ? '0' + m : '' + m;
  document.getElementById('header-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' · ' + h + ':' + ms + ' ' + ampm;
}

function saveSetup() {
  var key = document.getElementById('setup-key').value.trim();
  var zip = document.getElementById('setup-zip').value.trim();
  if (!key || key.length < 20) { alert('Enter a valid API key'); return; }
  S.apiKey = key;
  S.zip = zip || '46151';
  saveState();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-morning').className = 'tab-btn' + (tab === 'morning' ? ' active' : '');
  document.getElementById('tab-midday').className = 'tab-btn' + (tab === 'midday' ? ' active' : '');
  document.getElementById('tab-evening').className = 'tab-btn' + (tab === 'evening' ? ' active' : '');
  var labels = { morning: 'Generate Morning Briefing', midday: 'Generate Midday Briefing', evening: 'Generate Evening Briefing' };
  document.getElementById('gen-label').textContent = labels[tab];
  document.getElementById('briefing-output').innerHTML = '<div class="briefing-empty"><div class="icon">📋</div><p>Tap the button above to generate your briefing</p></div>';
}

function showSettings() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('settings-screen').style.display = 'flex';
  document.getElementById('settings-screen').style.flexDirection = 'column';
  document.getElementById('s-key').value = S.apiKey || '';
  document.getElementById('s-zip').value = S.zip || '';
}

function showMain() {
  document.getElementById('settings-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function saveSettings() {
  var key = document.getElementById('s-key').value.trim();
  var zip = document.getElementById('s-zip').value.trim();
  if (key) S.apiKey = key;
  if (zip) S.zip = zip;
  saveState();
  showMain();
}

function openRemind() {
  document.getElementById('remind-modal').classList.add('open');
  document.getElementById('remind-text').focus();
}

function closeRemind() {
  document.getElementById('remind-modal').classList.remove('open');
  document.getElementById('remind-text').value = '';
}

function submitRemind() {
  var text = document.getElementById('remind-text').value.trim();
  if (!text) return;
  closeRemind();
  sendReminderToClaudeAPI(text);
}

function sendReminderToClaudeAPI(text) {
  var now = new Date();
  var prompt = 'User wants to set this reminder: "' + text + '". Today is ' + now.toLocaleDateString() + ' ' + now.toLocaleTimeString() + '. Confirm what was set in one short sentence. No extra talk.';
  callClaude(prompt, [], function(response) {
    showToast('🔔 ' + response);
  });
}

function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:90px;left:16px;right:16px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;font-size:13px;color:#f0f0f0;z-index:300;text-align:center;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { document.body.removeChild(t); }, 3000);
}

function getBriefingPrompt(type) {
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  var timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  var zip = S.zip || '46151';
  var isSunday = now.getDay() === 0;

  var base = 'You are a personal assistant for Chris Dittemore in Martinsville, Indiana (ZIP ' + zip + '). Today is ' + dateStr + ' at ' + timeStr + '. Be direct, practical, no fluff, no motivational language. Use web search for weather and stocks. Check Google Calendar (include Emily\'s calendar) and Gmail. ';

  var portfolioInfo = 'Portfolio: GOOGL 100sh, DKNG 261sh, LMT 19sh, MU 25sh (cost basis $118/sh), IHAK 117.77sh, SCZ 179.09sh, SPY 34sh, VO 275.58sh, VOO 122.94sh, FNWFX 156.63sh, FRISX 308.94sh, MDIZX 853.04sh. Show current price, daily change, and for MU show gain/loss vs $118 cost basis.';

  var medInfo = 'Medications to track: Lisinopril 40mg (OVERDUE refill since 6/9/26), Sildenafil 20mg (auto refill 6/17/26), Testosterone Cyp 200mg (last filled 5/29/26 qty 4), Anastrozole 1mg (auto refill 8/21/26), Omeprazole 40mg (auto refill 8/27/26), Tadalafil 5mg (auto refill 9/10/26). Flag anything due within 5 days.';

  var injectInfo = 'Retatrutide injection every 6 days. Last taken June 13 2026. Calculate next due date and flag if due today or tomorrow.';

  var gymInfo = 'Gym days are Monday through Friday mornings.';

  if (type === 'morning') {
    return base + 'Generate a morning briefing with these sections in order. Use emoji as section headers. Return ONLY a JSON object with a "sections" array. Each section has: id, emoji, title, content (HTML string), badge (optional short text), badgeOk (boolean). Sections: ' +
      '1. WEATHER (emoji 🌤) - Search weather for ZIP ' + zip + '. Today full, tomorrow full, 5-day outlook. Temp and conditions only. ' +
      '2. CALENDAR (emoji 📅) - Check Google Calendar for Chris and Emily. Today and next 48 hours. Flag birthdays. ' +
      '3. EMAIL (emoji 📧) - Check Gmail. Always surface: Elks, Edward Jones, Ducks Unlimited, bills, Tami, IU Health. Urgent only for others. ' +
      '4. TASKS (emoji 📋) - Check Google Tasks. Flag overdue loudly. Return tasks as array in section "tasks" field with id, text, done, overdue fields. ' +
      '5. FARM (emoji 🐓) - List recurring checks: Chicken water, Chicken food, Bees, Garden. Return as tasks array. ' +
      '6. ELKS (emoji 🦌) - Surface any Elks Lodge 1349 calendar events or email. ' +
      '7. MEDS (emoji 💊) - ' + medInfo + ' ' + injectInfo + ' ' +
      '8. GYM (emoji 💪) - ' + gymInfo + ' Is today a gym day? What day of the split is it (Push/Pull/Legs/Upper/Lower)? ' +
      'Respond ONLY with valid JSON, no markdown, no backticks.';
  }

  if (type === 'midday') {
    return base + 'Generate a midday briefing. Return ONLY a JSON object with a "sections" array. Each section has: id, emoji, title, content (HTML string), badge, badgeOk. Sections: ' +
      '1. WEATHER (emoji 🌤) - Rest of today and tomorrow. ' +
      '2. CALENDAR (emoji 📅) - Anything due this afternoon or evening. ' +
      '3. TASKS (emoji 📋) - Open tasks due today. Flag overdue. Return tasks array with id, text, done, overdue. ' +
      '4. STOCKS (emoji 📈) - ' + portfolioInfo + ' Search current prices. ' +
      '5. ELKS (emoji 🦌) - Any Elks events today or this week. ' +
      'Respond ONLY with valid JSON, no markdown, no backticks.';
  }

  if (type === 'evening') {
    if (isSunday) {
      return base + 'Generate a WEEKLY SUNDAY SUMMARY evening briefing. Return ONLY a JSON object with "sections" array. Each section: id, emoji, title, content, badge, badgeOk. Sections: ' +
        '1. WEEK REVIEW (emoji 📆) - Calendar recap from Google Calendar this past week. ' +
        '2. STOCKS (emoji 📈) - ' + portfolioInfo + ' Weekly change summary. ' +
        '3. NEXT WEEK (emoji 🗓) - Preview of next week from calendar. ' +
        '4. CHECKIN (emoji 🧠) - Ask: How was your energy this week? Any wins? What carries into next week? Return as a form with mood slider and text fields. ' +
        'Respond ONLY with valid JSON, no markdown, no backticks.';
    }
    return base + 'Generate an evening briefing and accountability check-in. Return ONLY a JSON object with "sections" array. Each section: id, emoji, title, content, badge, badgeOk. Sections: ' +
      '1. TOMORROW (emoji 🗓) - Weather tomorrow. Calendar preview next 48 hours from Google Calendar. ' +
      '2. STOCKS (emoji 📈) - ' + portfolioInfo + ' Search closing prices. ' +
      '3. ACCOUNTABILITY (emoji ✅) - Farm tasks and personal tasks as checkbox list. Return tasks array with id, text, done, overdue. ' +
      '4. HEALTH (emoji 🏃) - Gym: did they have gym today (Mon-Fri)? Hydration: ask how many oz of water. ' + injectInfo + ' ' +
      '5. CHECKIN (emoji 🧠) - Mood/energy check 1-10. Weight and calories today (manual input). ' +
      'Respond ONLY with valid JSON, no markdown, no backticks.';
  }
}

function callClaude(prompt, mcpServers, callback) {
  var body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 4000,
    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
    mcp_servers: [
      { type: 'url', url: 'https://gmailmcp.googleapis.com/mcp/v1', name: 'gmail-mcp' },
      { type: 'url', url: 'https://calendarmcp.googleapis.com/mcp/v1', name: 'calendar-mcp' }
    ],
    messages: [{ role: 'user', content: prompt }]
  };

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': S.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-calls': 'true'
    },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = '';
    if (data.content) {
      for (var i = 0; i < data.content.length; i++) {
        if (data.content[i].type === 'text') text += data.content[i].text;
      }
    }
    callback(text, data);
  })
  .catch(function(e) {
    callback('Error: ' + e.message, null);
  });
}

function generateBriefing() {
  var btn = document.getElementById('gen-btn');
  btn.disabled = true;

  var steps = ['Checking calendar...', 'Scanning email...', 'Pulling weather...', 'Building briefing...'];
  if (currentTab === 'midday' || currentTab === 'evening') {
    steps = ['Pulling stock prices...', 'Checking calendar...', 'Building briefing...'];
  }

  var out = document.getElementById('briefing-output');
  out.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Generating your briefing...</div><div class="loading-steps" id="load-steps"></div></div>';

  var stepEl = document.getElementById('load-steps');
  var si = 0;
  for (var x = 0; x < steps.length; x++) {
    var s = document.createElement('div');
    s.className = 'loading-step';
    s.id = 'ls-' + x;
    s.textContent = steps[x];
    stepEl.appendChild(s);
  }

  var stepTimer = setInterval(function() {
    if (si > 0) {
      var prev = document.getElementById('ls-' + (si-1));
      if (prev) prev.className = 'loading-step done';
    }
    var cur = document.getElementById('ls-' + si);
    if (cur) cur.className = 'loading-step active';
    si++;
    if (si >= steps.length) clearInterval(stepTimer);
  }, 1800);

  var prompt = getBriefingPrompt(currentTab);

  callClaude(prompt, [], function(text) {
    clearInterval(stepTimer);
    btn.disabled = false;
    try {
      var clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
      var firstBrace = clean.indexOf('{');
      var lastBrace = clean.lastIndexOf('}');
      if (firstBrace !== -1 && lastBrace !== -1) {
        clean = clean.substring(firstBrace, lastBrace + 1);
      }
      var data = JSON.parse(clean);
      renderBriefing(data);
    } catch(e) {
      out.innerHTML = '<div class="briefing-card"><div style="padding:16px;"><div class="info-line">' + text.replace(/\n/g, '<br>') + '</div></div></div>';
    }
  });
}

function renderBriefing(data) {
  var out = document.getElementById('briefing-output');
  if (!data.sections || !data.sections.length) {
    out.innerHTML = '<div class="briefing-empty"><div class="icon">⚠️</div><p>No briefing data returned. Try again.</p></div>';
    return;
  }

  var html = '<div class="briefing-card">';

  for (var i = 0; i < data.sections.length; i++) {
    var sec = data.sections[i];
    var secId = 'sec-' + i;
    var isOpen = i === 0;

    var badgeHtml = '';
    if (sec.badge) {
      badgeHtml = '<span class="section-badge ' + (sec.badgeOk ? 'ok' : '') + '">' + sec.badge + '</span>';
    }

    html += '<div class="section">';
    html += '<div class="section-header" onclick="toggleSection(\'' + secId + '\')">';
    html += '<span class="section-emoji">' + (sec.emoji || '📌') + '</span>';
    html += '<span class="section-title">' + sec.title + '</span>';
    html += badgeHtml;
    html += '<span class="section-chevron ' + (isOpen ? 'open' : '') + '" id="chev-' + secId + '">›</span>';
    html += '</div>';
    html += '<div class="section-body ' + (isOpen ? 'open' : '') + '" id="' + secId + '">';

    if (sec.tasks && sec.tasks.length) {
      html += renderTasks(sec.tasks, secId);
    } else {
      html += '<div class="info-line">' + (sec.content || '') + '</div>';
    }

    if (sec.id === 'CHECKIN' || sec.id === 'checkin') {
      html += renderCheckIn();
    }

    html += '</div></div>';
  }

  html += '</div>';

  html += '<div class="quick-actions">';
  html += '<div class="qa-btn" onclick="openRemind()"><div class="qa-emoji">🔔</div><div class="qa-label">Set Reminder</div></div>';
  html += '<div class="qa-btn" onclick="openGmail()"><div class="qa-emoji">📧</div><div class="qa-label">Open Gmail</div></div>';
  html += '<div class="qa-btn" onclick="openCalendar()"><div class="qa-emoji">📅</div><div class="qa-label">Open Calendar</div></div>';
  html += '<div class="qa-btn" onclick="openTasks()"><div class="qa-emoji">✅</div><div class="qa-label">Open Tasks</div></div>';
  html += '</div>';

  out.innerHTML = html;
}

function renderTasks(taskList, secId) {
  var html = '';
  for (var i = 0; i < taskList.length; i++) {
    var t = taskList[i];
    var tid = secId + '-task-' + i;
    var isDone = tasks[tid] || t.done;
    html += '<div class="task-item">';
    html += '<div class="task-check ' + (isDone ? 'checked' : '') + '" id="chk-' + tid + '" onclick="toggleTask(\'' + tid + '\')"></div>';
    html += '<div>';
    html += '<div class="task-text ' + (isDone ? 'done' : '') + '" id="txt-' + tid + '">' + t.text + '</div>';
    if (t.overdue) {
      html += '<div class="task-meta task-overdue">⚠️ OVERDUE</div>';
    }
    html += '</div></div>';
  }
  return html;
}

function renderCheckIn() {
  return '<div class="mood-wrap">' +
    '<div class="mood-label">Mood & Energy (1-10)</div>' +
    '<div class="mood-row">' +
    '<input type="range" class="mood-slider" min="1" max="10" value="7" id="mood-val" oninput="document.getElementById(\'mood-num\').textContent=this.value">' +
    '<div class="mood-value" id="mood-num">7</div>' +
    '</div>' +
    '</div>' +
    '<div class="input-row">' +
    '<input class="input-field" type="number" placeholder="Weight (lbs)" id="ci-weight">' +
    '<input class="input-field" type="number" placeholder="Calories" id="ci-cals">' +
    '</div>' +
    '<div class="input-row">' +
    '<input class="input-field" type="number" placeholder="Water (oz)" id="ci-water">' +
    '<button class="btn-small" onclick="saveCheckIn()">Save</button>' +
    '</div>';
}

function saveCheckIn() {
  var mood = document.getElementById('mood-val') ? document.getElementById('mood-val').value : '';
  var weight = document.getElementById('ci-weight') ? document.getElementById('ci-weight').value : '';
  var cals = document.getElementById('ci-cals') ? document.getElementById('ci-cals').value : '';
  var water = document.getElementById('ci-water') ? document.getElementById('ci-water').value : '';
  S.lastCheckin = { mood: mood, weight: weight, cals: cals, water: water, date: new Date().toLocaleDateString() };
  saveState();
  showToast('✅ Check-in saved');
}

function toggleTask(tid) {
  tasks[tid] = !tasks[tid];
  saveTasks();
  var chk = document.getElementById('chk-' + tid);
  var txt = document.getElementById('txt-' + tid);
  if (chk) chk.className = 'task-check ' + (tasks[tid] ? 'checked' : '');
  if (txt) txt.className = 'task-text ' + (tasks[tid] ? 'done' : '');
}

function toggleSection(id) {
  var body = document.getElementById(id);
  var chev = document.getElementById('chev-' + id);
  if (!body) return;
  var isOpen = body.classList.contains('open');
  body.className = 'section-body ' + (isOpen ? '' : 'open');
  if (chev) chev.className = 'section-chevron ' + (isOpen ? '' : 'open');
}

function openGmail() { window.open('https://mail.google.com', '_blank'); }
function openCalendar() { window.open('https://calendar.google.com', '_blank'); }
function openTasks() { window.open('https://tasks.google.com', '_blank'); }

window.onload = init;
</script>
